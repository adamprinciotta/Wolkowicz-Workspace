<script>
   const API = 'http://localhost:4000';
   let currentUser = null;

   async function getCurrentUser() {
     const token = localStorage.getItem('token');
     if (!token) return null;
     try {
       const res = await fetch(`${API}/api/auth/me`, {
         headers: { 'Authorization': `Bearer ${token}` }
       });
       if (!res.ok) return null;
       const user = await res.json();
       currentUser = user;
       return user;
     } catch (e) {
       return null;
     }
   }
   
   function escapeHtml(s) {
     return String(s ?? '').replace(/[&<>"']/g, c => ({
       '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
     }[c]));
   }
   
   function pickLink(p) {
     return p.doi_url || p.landing_page_url || p.external_id || '#';
   }
   
   async function fetchComments(pubId) {
     const r = await fetch(`${API}/api/publications/${pubId}/comments`, { cache: 'no-store' });
     if (!r.ok) throw new Error('comments fetch failed');
     return r.json();
   }

   async function deleteComment(commentId, pubId) {
     if (!confirm('Delete this comment?')) return;
     
     const token = localStorage.getItem('token');
     const r = await fetch(`${API}/api/comments/${commentId}`, {
       method: 'DELETE',
       headers: { 'Authorization': `Bearer ${token}` }
     });
     
     if (r.ok) {
       const data = await fetchComments(pubId);
       const list = document.getElementById(`comments-list-${pubId}`);
       const countEl = document.getElementById(`comments-count-${pubId}`);
       renderCommentList(list, data);
       countEl.textContent = String(data.length);
     } else {
       alert('Failed to delete comment');
     }
   }
   
    function renderCommentList(el, comments) {
      let html = '';
      if (comments.length > 0) {
        html = comments.map(c => {
          const isCreator = currentUser && c.user_id && currentUser.id === c.user_id._id;
          const isAdmin = currentUser && currentUser.is_admin;
          const canDelete = isCreator || isAdmin;
          const deleteBtn = canDelete ? `<button onclick="deleteComment('${c._id}', '${c.publication_id}')" style="margin-left: 10px; color: #e74c3c; cursor: pointer; border: none; background: none; text-decoration: underline; font-weight: 500;">Delete</button>` : '';
          return `<li><strong>${escapeHtml(c.display_name || 'Anonymous')}</strong>: ${escapeHtml(c.body)} <em>${new Date(c.created_at).toLocaleString()}</em> ${deleteBtn}</li>`;
        }).join('');
      } else {
        html = '<li style="color: #7a8a99;">No comments yet.</li>';
      }
      el.innerHTML = html;
    }
   
    async function renderPubsByYear() {
     const res  = await fetch(`${API}/api/publications`, { cache: 'no-store' });
     const pubs = await res.json();
   
     const groups = pubs.reduce((acc, p) => {
       const key = p.year ? String(p.year) : 'Undated';
       (acc[key] ||= []).push(p);
       return acc;
     }, {});
     const years = Object.keys(groups).sort((a, b) => {
       if (a === 'Undated') return 1;
       if (b === 'Undated') return -1;
       return Number(b) - Number(a);
     });
   
     const container = document.getElementById('pubs-by-year');
     container.innerHTML = years.map(y => {
       const items = groups[y].map(p => {
         const pid = (p._id && String(p._id)) || p.external_id;
         const cWrapId = `comments-wrap-${pid}`;
         const cListId = `comments-list-${pid}`;
         const cCountId = `comments-count-${pid}`;
         const cFormId = `cform-${pid}`;
         
         const href = pickLink(p);
         const hasLink = href && href !== '#';
         
         const formHtml = currentUser ? `
           <form class="cform-inline" id="${cFormId}" data-id="${pid}">
             <input name="body" placeholder="Write a comment..." required />
             <button type="submit">Post</button>
           </form>
         ` : `<p style="color: #7a8a99; font-size: 14px;"><em>Sign in to comment</em></p>`;
   
         return `
           <div class="pub-item-redesigned">
             <div class="pub-title">${escapeHtml(p.title || 'Untitled')}</div>
             <div class="pub-authors">${escapeHtml(p.authors_ieee || 'No authors listed')}</div>
             <div class="pub-actions">
               ${hasLink ? `<a href="${href}" target="_blank" rel="noopener" class="pub-link-btn">View Article</a>` : ''}
               <button type="button" class="comment-toggle" data-id="${pid}">
                 Comments (<span id="${cCountId}">…</span>)
               </button>
             </div>
             
             <div class="comments-wrap" id="${cWrapId}" hidden>
               <ul class="comments-list" id="${cListId}"></ul>
               ${formHtml}
             </div>
           </div>
         `;
       }).join('');
   
       return `
         <section class="pub-year">
           <h3 class="year-header">${escapeHtml(y)}</h3>
           <div class="pub-list">
             ${items}
           </div>
         </section>
       `;
     }).join('');
   
     container.querySelectorAll('.comment-toggle').forEach(btn => {
       btn.addEventListener('click', async () => {
         const pubId = btn.dataset.id;
         const wrap = document.getElementById(`comments-wrap-${pubId}`);
         const list = document.getElementById(`comments-list-${pubId}`);
         const countEl = document.getElementById(`comments-count-${pubId}`);
   
         const opening = wrap.hasAttribute('hidden');
         if (opening) {
           try {
             const data = await fetchComments(pubId);
             renderCommentList(list, data);
             countEl.textContent = String(data.length);
           } catch {
             list.innerHTML = '<li>Failed to load comments.</li>';
             countEl.textContent = '?';
           }
           wrap.removeAttribute('hidden');
         } else {
           wrap.setAttribute('hidden', '');
         }
       });
     });

     if (currentUser) {
       container.querySelectorAll('.cform-inline').forEach(form => {
         form.addEventListener('submit', async (e) => {
           e.preventDefault();
           const pubId = form.dataset.id;
           const list = document.getElementById(`comments-list-${pubId}`);
           const countEl = document.getElementById(`comments-count-${pubId}`);
     
           const payload = {
             body: form.body.value
           };
     
           const token = localStorage.getItem('token');
           const r = await fetch(`${API}/api/publications/${pubId}/comments`, {
             method: 'POST',
             headers: { 
               'Content-Type': 'application/json',
               'Authorization': `Bearer ${token}`
             },
             body: JSON.stringify(payload),
             credentials: 'include'
           });
     
           if (r.ok) {
             form.reset();
             const data = await fetchComments(pubId);
             renderCommentList(list, data);
             countEl.textContent = String(data.length);
           } else {
             const err = await r.json().catch(() => ({}));
             alert(err.error || 'Failed to post comment');
           }
         });
       });
     }
   
      container.querySelectorAll('.comment-toggle').forEach(async btn => {
       const pubId = btn.dataset.id;
       const countEl = document.getElementById(`comments-count-${pubId}`);
       try {
         const r = await fetch(`${API}/api/publications/${pubId}/comments/count`, { cache: 'no-store' });
         const { count } = await r.json();
         countEl.textContent = String(count);
       } catch {
         countEl.textContent = '?';
       }
     });
   }
   
   getCurrentUser().then(() => {
     renderPubsByYear();
   });

   window.addEventListener('storage', () => {
     getCurrentUser().then(() => {
       renderPubsByYear();
     });
   });
</script>
