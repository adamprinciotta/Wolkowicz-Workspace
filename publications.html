<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Publications - Dr. Wolkowicz Lab</title>
    <meta name="description" content="Publications from Dr. Wolkowicz's research lab" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- React + Babel (no build needed) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <section class="nav">
      <a href="home.html">Home</a> |
      <a href="team.html">Team</a> |
      <a href="courses.html">Courses</a> |
      <a href="projects.html">Research</a> |
      <a href="publications.html">Publications</a>
    </section>

    <h1>Publications</h1>
    <div id="root"></div>

    <script type="text/babel">
      // One publication card
      function Publication({ id, title, authors, details, doi, doi_link }) {
        const [comments, setComments] = React.useState([]);
        const [loading, setLoading] = React.useState(true);

        // Fetch comments from your database API
        React.useEffect(() => {
          fetch(`/api/comments?paperId=${id}`)
            .then((res) => res.json())
            .then((data) => {
              setComments(data);
              setLoading(false);
            })
            .catch((err) => {
              console.error("Error loading comments:", err);
              setLoading(false);
            });
        }, [id]);

        return (
          <section className="pub-container">
            <div className="pub-item">
              <h3>{title}</h3>
              <p className="authors">{authors}</p>
              {doi_link && (
                <p>
                  &gt;&gt;{" "}
                  <a href={doi_link} target="_blank" rel="noopener noreferrer">
                    DOI {doi}
                  </a>
                </p>
              )}
              <p className="pub-details">{details}</p>

              <div className="comments-section">
                <h4>Comments</h4>
                {loading ? (
                  <p>Loading comments...</p>
                ) : comments.length > 0 ? (
                  <div className="comments-list">
                    {comments.map((comment, i) => (
                      <div className="comment" key={i}>
                        <p className="comment-author">
                          <strong>{comment.author}</strong>
                        </p>
                        <p className="comment-text">{comment.text}</p>
                        <p className="comment-date">
                          <em>{comment.date}</em>
                        </p>
                      </div>
                    ))}
                  </div>
                ) : (
                  <p className="no-comments">No comments yet.</p>
                )}
              </div>
            </div>
          </section>
        );
      }

      // Full list
      function PublicationsList() {
        const [publications, setPublications] = React.useState([]);
        const [loading, setLoading] = React.useState(true);

        React.useEffect(() => {
          fetch("publications.json")
            .then((res) => res.json())
            .then((data) => {
              const sorted = data.sort((a, b) => (b.year || 0) - (a.year || 0));
              setPublications(sorted);
              setLoading(false);
            })
            .catch((err) => {
              console.error("Error loading publications:", err);
              setLoading(false);
            });
        }, []);

        if (loading) return <p>Loading publications...</p>;

        return (
          <div>
            {publications.map((pub, i) => (
              <React.Fragment key={i}>
                <Publication {...pub} />
                <hr />
              </React.Fragment>
            ))}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<PublicationsList />);
    </script>
  </body>
</html>
