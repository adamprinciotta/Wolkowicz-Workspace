<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Research Team - Dr. Wolkowicz Lab</title>
    <meta
      name="description"
      content="Meet the research team at Dr. Wolkowicz's lab"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <!-- Navigation -->
    <section class="nav">
            <a href="home.html">Home</a> |
            <a href="team.html">Team</a> |
            <a href="courses.html">Courses</a> |
            <a href="projects.html">Research</a> |
            <a href="publications.html">Publications</a>
            <div class="auth-container">
            <button id="signinBtn" class="google-signin-btn" onclick="signinWithGoogle()">
                Sign in with Google
            </button>
                <div id="userInfo" class="user-info hidden">
                    <img id="userAvatar" class="user-avatar" alt="Profile">
                    <div class="user-details">
                        <span id="userName"></span>
                        <span id="userEmail"></span>
                    </div>
                    <button id="logoutBtn" class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </section>
        
        <script src="auth.js"></script>

    <div class="team-intro">
      <h1>Research Team</h1>
      <h2>Current Lab Members</h2>
    </div>

    <!-- React mounts here -->
    <section class="all-members">
      <div id="team-root"></div>
    </section>

    <section class="alumni-header">
      <h2>Lab Alumni</h2>
    </section>

    <!-- React mounts here -->
    <section class="alumni-section">
      <div id="alumni-root"></div>
    </section>

    <hr />

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Components -->
    <script type="text/babel">
      // Team Member component
      function TeamMember({ name, title, bio, focus, photo }) {
        return (
          <section className="team-section">
            <hr />
            <div className="team-member-row">
              <div className="member-photo">
                <img src={photo} alt={`${name} photo`} />
              </div>
              <div className="member-info">
                <div className="member-header">
                  <h2>{name}</h2>
                  <p className="member-title">
                    <em>{title}</em>
                  </p>
                </div>
                <p className="member-bio">{bio}</p>
                <p className="research-keywords">
                  <strong>Research Focus:</strong> {focus}
                </p>
              </div>
            </div>
          </section>
        );
      }

      // Alumni Row component
      function AlumniRow({ name, degree, current }) {
        return (
          <tr>
            <td>{name}</td>
            <td>{degree}</td>
            <td>{current}</td>
          </tr>
        );
      }

      // Alumni Table component
      function AlumniTable({ alumni }) {
        return (
          <table className="alumni-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Former Position</th>
                <th>Current Position</th>
              </tr>
            </thead>
            <tbody>
              {alumni.map((a, index) => (
                <AlumniRow key={index} {...a} />
              ))}
            </tbody>
          </table>
        );
      }

      // Team data
      const teamMembers = [
        {
          name: "Kelilah Wolkowicz",
          title: "Assistant Professor, Mechanical and Industrial Engineering",
          bio: "Kelilah studies problems in healthcare that could be solved by applying design, control theory, and robotics. Her research focuses on developing methods and mechanisms to further enhance or promote user independence, while addressing users’ needs to remain, as much as possible, integrated socially and productively as members of their communities. Kelilah is an engineering faculty advocate for the River Hawks Scholar Academy, an engineering faculty fellow for DifferenceMaker, and a faculty advisor for the Society of Women Engineers UML chapter.",
          focus: "[Keywords]",
          photo: "images/home.webp",
        },
        {
          name: "Elyas Irankhah",
          title: "PhD Candidate",
          bio: "Description for student",
          focus: "[Keywords]",
          photo: "",
        },
        {
          name: "Masoumeh Farhadi Nia",
          title: "PhD Candidate",
          bio: "Masoumeh Farhadi Nia is a PhD student in Electrical and Computer Engineering at University of Massachusetts Lowell, where she is a member of CARE, Collaborative Assistive and Rehabilitative Robotics Engineering, and CACT, Center for Advanced Computation and Telecommunications, labs. Her research focuses on Signal Processing and AI, with a particular emphasis on EEG-based Brain-Computer Interface (BCI) signal analysis for electric wheelchair navigation.",
          focus: "Signal Processing and AI",
          photo: "",
        },
        {
          name: "Student Name 4",
          title: "Title",
          bio: "Description for student",
          focus: "[Keywords]",
          photo: "",
        },
      ];

      // Alumni data
      const alumni = [
        {
          name: "Alumni 1",
          degree: "Degree [Year]",
          current: "Current Position",
        },
        {
          name: "Alumni 2",
          degree: "Degree [Year]",
          current: "Current Position",
        },
        {
          name: "Alumni 3",
          degree: "Degree [Year]",
          current: "Current Position",
        },
      ];

      // Section wrapper for team members
      function TeamSection() {
        return (
          <>
            {teamMembers.map((member, i) => (
              <TeamMember key={i} {...member} />
            ))}
          </>
        );
      }

      // Section wrapper for alumni
      function AlumniSection() {
        return <AlumniTable alumni={alumni} />;
      }

      // Mount React components
      const teamRoot = ReactDOM.createRoot(document.getElementById("team-root"));
      teamRoot.render(<TeamSection />);

      const alumniRoot = ReactDOM.createRoot(document.getElementById("alumni-root"));
      alumniRoot.render(<AlumniSection />);
    </script>
  </body>
</html>
